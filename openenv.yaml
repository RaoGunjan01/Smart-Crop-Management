spec_version: 1
openenv_version: "0.2.0"
name: precision-irrigation-scheduling
version: "1.0.0"
description: >
  A multi-zone crop irrigation scheduling environment where an AI agent
  decides when and how much to water crops based on soil moisture,
  weather forecasts, and water budget constraints.
entrypoint: api.main:app
app: api.main:app
port: 8000
api:
  health: /health
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  grader: /grader
grader:
  module: graders
  function: grade_task
graders:
  easy:
    module: graders
    function: grade_easy
  medium:
    module: graders
    function: grade_medium
  hard:
    module: graders
    function: grade_hard
tasks:
  - name: easy
    title: "Don't Kill the Crop"
    description: "Keep crop stress under control from start to finish."
    max_steps: 120
    grader:
      module: graders
      function: grade_easy
  - name: medium
    title: "Respect the Rain"
    description: "Read the rain forecast and hold irrigation when rain is coming."
    max_steps: 240
    grader:
      module: graders
      function: grade_medium
  - name: hard
    title: "Do More With Less"
    description: "Maximize yield while minimizing water across the episode."
    max_steps: 360
    grader:
      module: graders
      function: grade_hard
