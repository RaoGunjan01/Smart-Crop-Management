# OpenEnv manifest — structured grader blocks (validators often ignore string-only grader paths).
spec_version: 1
name: precision-irrigation-scheduling
version: "1.0.0"
type: space
runtime: fastapi
app: api.main:app
entrypoint: api.main:app
port: 8000
description: >
  A multi-zone crop irrigation scheduling environment where an AI agent
  decides when and how much to water crops based on soil moisture,
  weather forecasts, and water budget constraints.
tags:
  - openenv
  - agriculture
  - reinforcement-learning
observation_space:
  type: Box
  shape: variable (n_zones * 4 + 8)
  dtype: float32
  description: >
    Per-zone: soil_moisture, crop_growth_stage, stress_index,
    days_since_irrigation. Global: temp_c, humidity, rain_forecast_mm,
    evapotranspiration, water_budget_remaining, cost_per_liter,
    day_of_season, time_of_day.
action_space:
  type: MultiDiscrete
  description: >
    One discrete action per zone (0=SKIP, 1=IRRIGATE_LOW,
    2=IRRIGATE_MED, 3=IRRIGATE_HIGH, 4=IRRIGATE_FLOOD)
    plus one global action slot (5=EMERGENCY, 6=PAUSE_ALL).
reward:
  type: float
  range: [-inf, +inf]
  terminal_bonus: 1.0

graders:
  easy: irrigation_env.grader:grade_easy
  medium: irrigation_env.grader:grade_medium
  hard: irrigation_env.grader:grade_hard

tasks:
  - id: easy
    name: easy
    description: 1 zone, short season, generous budget
    difficulty: 1
    max_steps: 120
    reward_range: [0.0, 1.0]
    grader_path: /grade/easy
    grader_url: /grade/easy
    grader:
      type: http
      path: /grade/easy
      endpoint: /grade/easy
      method: GET
    python_grader: irrigation_env.grader:grade_easy

  - id: medium
    name: medium
    description: 4 zones, moderate budget, rain forecasts
    difficulty: 2
    max_steps: 240
    reward_range: [0.0, 1.0]
    grader_path: /grade/medium
    grader_url: /grade/medium
    grader:
      type: http
      path: /grade/medium
      endpoint: /grade/medium
      method: GET
    python_grader: irrigation_env.grader:grade_medium

  - id: hard
    name: hard
    description: 8 zones, scarce budget, sensor noise
    difficulty: 3
    max_steps: 360
    reward_range: [0.0, 1.0]
    grader_path: /grade/hard
    grader_url: /grade/hard
    grader:
      type: http
      path: /grade/hard
      endpoint: /grade/hard
      method: GET
    python_grader: irrigation_env.grader:grade_hard
