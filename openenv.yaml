# OpenEnv manifest — each task must declare `grader:` as module:function (colon) for static validators.
spec_version: 1
name: precision-irrigation-scheduling
version: "1.0.0"
type: space
runtime: fastapi
app: api.main:app
entrypoint: api.main:app
port: 8000
api:
  health: /health
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  grader: /grader
description: >
  A multi-zone crop irrigation scheduling environment where an AI agent
  decides when and how much to water crops based on soil moisture,
  weather forecasts, and water budget constraints.
tags:
  - openenv
  - agriculture
  - reinforcement-learning
observation_space:
  type: Box
  shape: variable (n_zones * 4 + 8)
  dtype: float32
  description: >
    Per-zone: soil_moisture, crop_growth_stage, stress_index,
    days_since_irrigation. Global: temp_c, humidity, rain_forecast_mm,
    evapotranspiration, water_budget_remaining, cost_per_liter,
    day_of_season, time_of_day.
action_space:
  type: MultiDiscrete
  description: >
    One discrete action per zone (0=SKIP, 1=IRRIGATE_LOW,
    2=IRRIGATE_MED, 3=IRRIGATE_HIGH, 4=IRRIGATE_FLOOD)
    plus one global action slot (5=EMERGENCY, 6=PAUSE_ALL).
reward:
  type: float
  range: [-inf, +inf]
  terminal_bonus: 1.0

graders:
  easy: irrigation_env.grader:grade_easy
  medium: irrigation_env.grader:grade_medium
  hard: irrigation_env.grader:grade_hard

task_validation:
  minimum_tasks_with_graders: 3
  declared_tasks:
    - easy
    - medium
    - hard

tasks:
  - id: easy
    name: Don't Kill the Crop
    description: >
      Keep crop stress under control from start to finish.
      Works on any zone count, any season, any budget.
      Tests the most fundamental agent skill: stress prevention.
    difficulty: 1
    max_steps: 120
    reward_range: [0.0, 1.0]
    grader: irrigation_env.grader:grade_easy
    grader_endpoint: /grade/easy

  - id: medium
    name: Respect the Rain
    description: >
      Learn to read the rain forecast and hold back irrigation when rain is coming.
      Works on any configuration. Tests forecast-awareness and resource restraint.
    difficulty: 2
    max_steps: 240
    reward_range: [0.0, 1.0]
    grader: irrigation_env.grader:grade_medium
    grader_endpoint: /grade/medium

  - id: hard
    name: Do More With Less
    description: >
      Achieve the best possible crop yield using the least possible water.
      Simultaneously optimise two competing objectives at every step.
      The only way to score well is precise, timely irrigation.
    difficulty: 3
    max_steps: 360
    reward_range: [0.0, 1.0]
    grader: irrigation_env.grader:grade_hard
    grader_endpoint: /grade/hard
